<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Left ear (grey) -->
  <polygon points="20,36 10,8 36,28" fill="#9DA8B3"/>
  <polygon points="21,34 14,14 33,27" fill="#F9C6CE"/>
  <!-- Right ear (white) -->
  <polygon points="80,36 90,8 64,28" fill="#E8EAEC"/>
  <polygon points="79,34 86,14 67,27" fill="#F9C6CE"/>

  <!-- Head base (white) -->
  <ellipse cx="50" cy="57" rx="36" ry="30" fill="#F2F3F4"/>

  <!-- Grey left patch -->
  <ellipse cx="30" cy="46" rx="20" ry="17" fill="#B0BAC4"/>

  <!-- Eyes white -->
  <ellipse cx="37" cy="54" rx="9" ry="8.5" fill="white"/>
  <ellipse cx="63" cy="54" rx="9" ry="8.5" fill="white"/>

  <!-- Iris (amber/hazel like in photo) -->
  <ellipse cx="37" cy="55" rx="5.5" ry="6" fill="#B8832A"/>
  <ellipse cx="63" cy="55" rx="5.5" ry="6" fill="#B8832A"/>

  <!-- Pupils -->
  <ellipse cx="37" cy="55.5" rx="2.8" ry="4" fill="#111827"/>
  <ellipse cx="63" cy="55.5" rx="2.8" ry="4" fill="#111827"/>

  <!-- Eye shine -->
  <circle cx="35" cy="52.5" r="1.8" fill="white"/>
  <circle cx="61" cy="52.5" r="1.8" fill="white"/>

  <!-- Nose -->
  <polygon points="50,67 47,64 53,64" fill="#F9A8D4"/>

  <!-- Mouth -->
  <path d="M50 67 Q46 71 42 69" stroke="#9CA3AF" fill="none" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M50 67 Q54 71 58 69" stroke="#9CA3AF" fill="none" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Whiskers -->
  <line x1="15" y1="63" x2="41" y2="64" stroke="#C9CDD2" stroke-width="1.4"/>
  <line x1="15" y1="69" x2="41" y2="67.5" stroke="#C9CDD2" stroke-width="1.4"/>
  <line x1="85" y1="63" x2="59" y2="64" stroke="#C9CDD2" stroke-width="1.4"/>
  <line x1="85" y1="69" x2="59" y2="67.5" stroke="#C9CDD2" stroke-width="1.4"/>

  <!-- Collar (dark like photo) -->
  <rect x="20" y="82" width="60" height="9" rx="4.5" fill="#374151"/>

  <!-- Tag ring 1 -->
  <circle cx="50" cy="92" r="5" fill="none" stroke="#9CA3AF" stroke-width="2.8"/>
  <!-- Tag ring 2 -->
  <circle cx="50" cy="98" r="4" fill="none" stroke="#9CA3AF" stroke-width="2.5"/>
</svg>
